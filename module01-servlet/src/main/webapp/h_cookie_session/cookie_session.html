<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>cookie session 확인하기</title>
</head>
<body>
<h1>쿠키와 세션 테스트</h1>
<hr>
<h2>쿠키 테스트</h2>
<form action="/cookie" method="post">
    <label>쿠키값 : <input type="text" name="cookieValue" placeholder="값을 입력해주세요"></label>
    <br>
    <button type="submit">쿠키에 값 넣기</button>
</form>
<hr>
<h2>세션 테스트</h2>
<form action="/session" method="post">
    <label>사용자 id : <input type="text" name="user_id" placeholder="값을 입력해주세요"></label>
    <br>
    <label>비밀번호 : <input type="password" name="user_pwd"></label>
    <button type="submit">로그인</button>
</form>
<p><a href="/session">세션 확인</a></p>
</body>
</html>
