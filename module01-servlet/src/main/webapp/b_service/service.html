<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Service Method</title>
</head>
<body>
  <h1>Service 메서드의 역할</h1>
  <h3>Get 방식의 요청</h3>
  <h4>a태그의 href 속성</h4>
  <a href="/request-service"> 서비스 메서드 요청하기</a>
  <h4>form 태그의 method 속성을 get으로 설정</h4>
  <form action="/request-service" method="get">
      <input type="submit" value="get방식 요청 !!">
  </form>
  <hr>
  <h3>post 방식의 요청</h3>
  <h4>form 태그의 method 속성을 post로 설정</h4>
  <form action="/request-service" method="post">
      <input type="submit" value="post방식 요청 !!">
  </form>
<!--submit 속성은 버튼-->
</body>
</html>
